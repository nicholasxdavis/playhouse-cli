name: Republish npm

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag to publish (package version must match, e.g. v0.2.0)
        required: true
        default: v0.2.0
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  npm-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Validate tag format
        env:
          TAG: ${{ inputs.tag }}
        run: |
          case "$TAG" in
            v[0-9]*.[0-9]*.[0-9]*) ;;
            *) echo "Tag must match vMAJOR.MINOR.PATCH"; exit 1 ;;
          esac

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.tag }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install script tooling
        run: npm ci --prefix scripts

      - name: Verify version sync
        run: npm run check-version-sync --prefix scripts

      - name: Publish to npm
        working-directory: packages/playhouse
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public
