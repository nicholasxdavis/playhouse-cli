name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  PLAYHOUSE_GITHUB_REPO: nicholasxdavis/playhouse-cli

jobs:
  version-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
      - name: Install script tooling
        run: npm ci --prefix scripts
      - name: Cargo.toml npm version sync
        run: npm run check-version-sync --prefix scripts

  rust:
    needs: version-sync
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          prefix-key: ci-${{ matrix.os }}-${{ matrix.target }}
          shared-key: cargo-lock-${{ hashFiles('Cargo.lock') }}
          save-if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}

      - name: Build
        shell: bash
        env:
          RUST_TARGET: ${{ matrix.target }}
        run: cargo build --release --target "$RUST_TARGET"

      - name: Unit and integration tests
        shell: bash
        env:
          RUST_TARGET: ${{ matrix.target }}
        run: cargo test --target "$RUST_TARGET"

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings

  npm-smoke:
    needs: rust
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - name: Build native binary
        run: cargo build --release

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20

      - name: Link local binary into npm package
        working-directory: packages/playhouse
        run: npm run link-local

      - name: Launcher version
        working-directory: packages/playhouse
        run: node bin/playhouse.js --version

      - name: Doctor smoke test
        working-directory: packages/playhouse
        run: node bin/playhouse.js doctor --json

      - name: Upgrade check smoke test
        working-directory: packages/playhouse
        run: node bin/playhouse.js upgrade --json
        continue-on-error: true

  verify-smoke:
    needs: rust
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            bin: target/release/playhouse
          - os: macos-latest
            bin: target/release/playhouse
          - os: windows-latest
            bin: target/release/playhouse.exe

    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          prefix-key: verify-${{ matrix.os }}
          shared-key: cargo-lock-${{ hashFiles('Cargo.lock') }}
          save-if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}

      - name: Build release binary
        run: cargo build --release

      - name: Install minimal bundled tools
        shell: bash
        env:
          PH_BIN: ${{ matrix.bin }}
        working-directory: tests/fixtures/rust-app
        run: '"$PH_BIN" install --minimal --json'

      - name: Verify fixture workspace
        shell: bash
        env:
          PH_BIN: ${{ matrix.bin }}
        working-directory: tests/fixtures/rust-app
        run: '"$PH_BIN" verify --json'

      - name: Functional fixture smoke
        shell: bash
        env:
          PH_BIN: ${{ matrix.bin }}
        working-directory: tests/fixtures/rust-app
        run: '"$PH_BIN" functional --json'
